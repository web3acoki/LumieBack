# ============================================================
# LumieClaw Backend - Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yaml up -d
# ============================================================

services:
  postgres:
    image: postgres:17.9-alpine
    restart: always
    ports:
      - "127.0.0.1:${DATABASE_PORT:-5432}:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: always
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file: .env
    environment:
      - DATABASE_HOST=postgres
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pg-data:
